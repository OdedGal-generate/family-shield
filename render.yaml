services:
  - type: web
    name: family-shield
    runtime: node
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DEV_OTP
        value: "true"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: "skip"
